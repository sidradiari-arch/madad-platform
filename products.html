<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>المفكرات الرقمية | أوان</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f8f8f5;
color:#222;
}

header{
background:white;
padding:25px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

header a{
text-decoration:none;
color:#222;
}

.container{
max-width:1100px;
margin:auto;
padding:60px 20px;
}

h1{
margin-bottom:15px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
margin-top:40px;
}

.card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.05);
}

.card h3{
margin-bottom:10px;
}

.price{
font-size:22px;
font-weight:bold;
margin:15px 0;
color:#92a285;
}

.button{
display:inline-block;
padding:12px 20px;
background:#92a285;
color:white;
text-decoration:none;
border-radius:10px;
}

.empty{
text-align:center;
padding:60px 20px;
background:white;
border-radius:15px;
margin-top:30px;
}
</style>

</head>

<body>

<header>
<a href="index.html">
<h2>أوان للمفكرات الرقمية</h2>
</a>
</header>

<div class="container">

<h1>المفكرات الرقمية</h1>

<p>
سيتم إضافة المنتجات الرقمية قريباً.
</p>

<div class="empty">

<h3>لا توجد منتجات حالياً</h3>

<p>
عند إضافة أي مفكرة رقمية ستظهر هنا تلقائياً.
</p>

</div>

</div>

</body>
</html>
