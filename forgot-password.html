<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>استعادة كلمة المرور | أوان</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f8f8f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:white;
width:450px;
max-width:90%;
padding:40px;
border-radius:20px;
box-shadow:0 4px 20px rgba(0,0,0,.08);
}

h1{
margin-bottom:20px;
text-align:center;
}

p{
margin-bottom:20px;
line-height:1.8;
text-align:center;
}

input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
margin-bottom:15px;
}

button{
width:100%;
padding:14px;
border:none;
background:#a3b295;
color:white;
border-radius:12px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="card">

<h1>استعادة كلمة المرور</h1>

<p>
أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة تعيين كلمة المرور.
</p>

<input type="email" placeholder="البريد الإلكتروني">

<button>
إرسال الرابط
</button>

</div>

</body>
</html>
