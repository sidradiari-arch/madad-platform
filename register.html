<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>إنشاء حساب | أوان</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f8f8f5;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.card{
background:white;
width:450px;
max-width:90%;
padding:40px;
border-radius:20px;
box-shadow:0 4px 20px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:12px;
}

button{
width:100%;
padding:14px;
border:none;
background:#a3b295;
color:white;
border-radius:12px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h1>إنشاء حساب</h1>

<input type="text" placeholder="الاسم الكامل">

<input type="email" placeholder="البريد الإلكتروني">

<input type="password" placeholder="كلمة المرور">

<input type="password" placeholder="تأكيد كلمة المرور">

<button>
إنشاء الحساب
</button>

</div>

</body>

</html>
