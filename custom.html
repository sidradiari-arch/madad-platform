<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>التنفيذ حسب الطلب | أوان</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f8f8f5;
color:#222;
}

header{
background:white;
padding:25px;
text-align:center;
box-shadow:0 2px 10px rgba(0,0,0,.05);
}

.container{
max-width:900px;
margin:auto;
padding:60px 20px;
}

.card{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 4px 15px rgba(0,0,0,.05);
}

h1{
margin-bottom:20px;
}

p{
line-height:2;
margin-bottom:20px;
}

input,
textarea{
width:100%;
padding:15px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:10px;
}

button{
padding:14px 28px;
border:none;
border-radius:10px;
background:#92a285;
color:white;
cursor:pointer;
}

footer{
text-align:center;
padding:25px;
background:white;
margin-top:40px;
}
</style>

</head>

<body>

<header>
<h2>أوان للمفكرات الرقمية</h2>
</header>

<div class="container">

<div class="card">

<h1>التنفيذ حسب الطلب</h1>

<p>
إذا كنت ترغب في تصميم مفكرة رقمية أو قالب مخصص وفق احتياجك، يمكنك إرسال تفاصيل الطلب من خلال النموذج التالي.
</p>

<form>

<input
type="text"
placeholder="الاسم">

<input
type="email"
placeholder="البريد الإلكتروني">

<textarea
rows="6"
placeholder="اكتب تفاصيل الطلب هنا"></textarea>

<button type="submit">
إرسال الطلب
</button>

</form>

</div>

</div>

<footer>
© أوان للمفكرات الرقمية
</footer>

</body>
</html>
